<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLWS Spelling Bee Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green:   #1a5c2a;
    --green-l: #2a7a3a;
    --green-d: #0d3318;
    --red:     #b8001f;
    --red-l:   #d4002a;
    --gold:    #c8992a;
    --gold-l:  #e0b830;
    --cream:   #fdfaf4;
    --white:   #ffffff;
    --shadow:  rgba(26,92,42,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--green-d);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(200,153,42,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(184,0,31,0.06) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Crimson Pro', Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    color: var(--cream);
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    text-align: center;
  }

  .header-text h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--gold-l);
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    line-height: 1.1;
  }
  .header-text p {
    font-size: 0.85rem;
    color: rgba(253,250,244,0.65);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 24px;
    width: 100%;
    max-width: 680px;
  }
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .filter-btn {
    font-family: 'Oswald', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border: 2px solid rgba(200,153,42,0.4);
    background: transparent;
    color: var(--gold-l);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--green-d);
  }
  .filter-btn.active { font-weight: 600; }

  .nav-row {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
  }
  .counter {
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    color: rgba(253,250,244,0.5);
    min-width: 80px;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .nav-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid rgba(200,153,42,0.5);
    background: transparent;
    color: var(--gold-l);
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: var(--gold); color: var(--green-d); border-color: var(--gold); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .shuffle-btn {
    font-family: 'Oswald', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border: 2px solid rgba(184,0,31,0.5);
    background: transparent;
    color: #e05070;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .shuffle-btn:hover { background: var(--red); color: white; border-color: var(--red); }

  /* ── Flashcard ── */
  .card-scene {
    width: 100%;
    max-width: 600px;
    height: 360px;
    perspective: 1200px;
    cursor: pointer;
    margin-bottom: 20px;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 20px;
    overflow: hidden;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      0 0 0 1px rgba(200,153,42,0.2);
  }

  /* Front */
  .card-front {
    background: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    position: relative;
  }
  .card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--green), var(--gold), var(--red), var(--gold), var(--green));
  }
  .card-front::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--green), var(--gold), var(--red), var(--gold), var(--green));
  }

  .difficulty-badge {
    position: absolute;
    top: 20px; right: 20px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge-Easy { background: rgba(26,92,42,0.12); color: var(--green); }
  .badge-Medium { background: rgba(200,153,42,0.15); color: #9a6d00; }
  .badge-Advanced { background: rgba(184,0,31,0.12); color: var(--red); }
  .badge-Off-List { background: rgba(100,100,100,0.1); color: #666; }

  .card-word {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 900;
    color: var(--green-d);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .card-pos {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: rgba(26,92,42,0.55);
    margin-bottom: 20px;
  }

  .speak-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 30px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(26,92,42,0.3);
  }
  .speak-btn:hover { background: var(--green-l); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,92,42,0.4); }
  .speak-btn:active { transform: translateY(0); }
  .speak-btn svg { width: 16px; height: 16px; }

  .flip-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.72rem;
    color: rgba(26,92,42,0.35);
    letter-spacing: 0.08em;
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }

  /* Back */
  .card-back {
    background: var(--green);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    padding: 28px 32px;
    position: relative;
    background-image:
      radial-gradient(ellipse at top right, rgba(200,153,42,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at bottom left, rgba(0,0,0,0.2) 0%, transparent 60%);
  }
  .card-back::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gold), var(--gold-l), var(--gold));
  }

  .back-word {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold-l);
    margin-bottom: 4px;
  }

  .syllable-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(224,184,48,0.6);
    margin-bottom: 6px;
    margin-top: 12px;
  }
  .syllable-display {
    display: flex;
    gap: 0;
    align-items: baseline;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .syllable-part {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: white;
    position: relative;
  }
  .syllable-part:not(:last-child)::after {
    content: '·';
    color: var(--gold);
    font-size: 1.8rem;
    line-height: 1;
    margin: 0 1px;
  }
  .syllable-count {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.45);
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    margin-bottom: 16px;
  }

  .sentence-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(224,184,48,0.6);
    margin-bottom: 8px;
  }
  .sentence-text {
    font-family: 'Crimson Pro', serif;
    font-size: 1.1rem;
    line-height: 1.55;
    color: rgba(253,250,244,0.9);
    flex: 1;
    overflow-y: auto;
  }
  .sentence-text em {
    color: var(--gold-l);
    font-style: italic;
    font-weight: 600;
  }

  .back-speak-btn {
    margin-top: 16px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 18px;
    background: rgba(255,255,255,0.1);
    color: var(--gold-l);
    border: 1px solid rgba(200,153,42,0.4);
    border-radius: 20px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    align-self: flex-start;
  }
  .back-speak-btn:hover { background: rgba(200,153,42,0.2); }
  .back-speak-btn svg { width: 13px; height: 13px; }

  /* ── Progress Bar ── */
  .progress-wrap {
    width: 100%; max-width: 600px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green-l), var(--gold));
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* ── Word List Panel ── */
  .panel-toggle {
    font-family: 'Oswald', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    padding: 6px 16px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(253,250,244,0.5);
    border-radius: 20px;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.2s;
  }
  .panel-toggle:hover { color: var(--cream); border-color: rgba(255,255,255,0.3); }

  .word-list-panel {
    width: 100%; max-width: 600px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    margin-top: 12px;
  }
  .word-list-panel.open { max-height: 320px; }
  .word-list-inner {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(200,153,42,0.15);
    border-radius: 12px;
    padding: 16px;
    max-height: 300px;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 4px 8px;
  }
  .word-chip {
    font-family: 'Crimson Pro', serif;
    font-size: 0.88rem;
    color: rgba(253,250,244,0.6);
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .word-chip:hover { color: var(--gold-l); background: rgba(200,153,42,0.1); }
  .word-chip.current { color: var(--gold-l); font-weight: 600; background: rgba(200,153,42,0.15); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(200,153,42,0.3); border-radius: 2px; }

  @media (max-width: 480px) {
    .card-scene { height: 320px; }
    .card-word { font-size: 2rem; }
    .header-text h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header class="header">

  <div class="header-text">
    <h1>MLWS Spelling Bee</h1>
    <p>Flashcard Study System</p>
  </div>
</header>

<div class="controls">
  <div class="filter-group" id="filterGroup">
    <button class="filter-btn active" data-filter="All" onclick="setFilter('All')">All (1014)</button>
    <button class="filter-btn" data-filter="Easy" onclick="setFilter('Easy')">Easy</button>
    <button class="filter-btn" data-filter="Medium" onclick="setFilter('Medium')">Medium</button>
    <button class="filter-btn" data-filter="Advanced" onclick="setFilter('Advanced')">Advanced</button>
  </div>
  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" title="Previous">&#8592;</button>
    <span class="counter" id="counter">1 / 1034</span>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)" title="Next">&#8594;</button>
    <button class="shuffle-btn" onclick="shuffle()">&#9632; Shuffle</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:0.1%"></div>
</div>

<div class="card-scene" id="cardScene" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face card-front" id="cardFront">
      <span class="difficulty-badge" id="diffBadge"></span>
      <div class="card-word" id="cardWord"></div>
      <div class="card-pos" id="cardPos"></div>
      <button class="speak-btn" id="speakFrontBtn" onclick="speakWord(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
        Hear Pronunciation
      </button>
      <div class="flip-hint">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.66 0 3-4 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4-3-9s1.34-9 3-9"/></svg>
        Tap card to reveal
      </div>
    </div>
    <div class="card-face card-back" id="cardBack">
      <div class="back-word" id="backWord"></div>
      <div class="syllable-label">Syllable Breakdown</div>
      <div class="syllable-display" id="syllableDisplay"></div>
      <div class="syllable-count" id="syllableCount"></div>
      <div class="sentence-label">Example Sentence</div>
      <div class="sentence-text" id="sentenceText"></div>
      <button class="back-speak-btn" onclick="speakWord(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        Hear Word
      </button>
    </div>
  </div>
</div>

<button class="panel-toggle" onclick="toggleList()">&#9776; Browse Word List</button>
<div class="word-list-panel" id="wordListPanel">
  <div class="word-list-inner" id="wordListInner"></div>
</div>

ntence":"Movies are stunted compared to the complexity, the richness, and the interrogative nature of books."},{"word":"perseverance","display":"perseverance [n.]","difficulty":"Off-List","sentence":"My perseverance paid off and I graduated at the top of my class."},{"word":"pollysylabic","display":"pollysylabic [adj.]","difficulty":"Off-List","sentence":"Polysyllabic words containing more than one syllable are usually more difficult for new readers to pronounce."},{"word":"procastinate","display":"procastinate [v.]","difficulty":"Off-List","sentence":"My friends and I procastinate our project until the last minute."},{"word":"quintessential","display":"quintessential [adj.]","difficulty":"Off-List","sentence":"He was the quintessential tough guy—strong, silent, and self-contained."},{"word":"superlative","display":"superlative [adj.]","difficulty":"Off-List","sentence":"She was a superlative student, getting nearly perfect grades on every assignment."},{"word":"surmountable","display":"surmountable [adj.]","difficulty":"Off-List","sentence":"Collective and collaborative effort can make any challenge surmountable."},{"word":"torturous","display":"torturous [adj.]","difficulty":"Off-List","sentence":"Going to the dentist is torturous enough already, but now I have to get a tooth removed."},{"word":"unsportsmanlike","display":"unsportsmanlike [adj.]","difficulty":"Off-List","sentence":"We received a penalty against us for unsportsmanlike behaviour."}].filter(w => w.difficulty !== "Off-List")];

let filtered = [...WORDS];
let currentIdx = 0;
let isFlipped = false;
let currentFilter = 'All';
let listOpen = false;

// ── Syllabification ──
function syllabify(word) {
  const w = word.toLowerCase().replace(/[^a-z]/g, '');
  if (w.length <= 2) return [w];
  
  const vowels = 'aeiouy';
  const isVowel = c => vowels.includes(c);
  
  // Simple onset-nucleus-coda splitting
  let parts = [];
  let cur = '';
  
  for (let i = 0; i < w.length; i++) {
    cur += w[i];
    const v = isVowel(w[i]);
    const nextV = i+1 < w.length ? isVowel(w[i+1]) : false;
    const nextNextV = i+2 < w.length ? isVowel(w[i+2]) : false;
    
    if (v && !nextV && i < w.length - 1) {
      // vowel followed by consonant - include the consonant then break
      if (i+1 < w.length && !nextNextV) {
        cur += w[i+1];
        i++;
      }
      parts.push(cur);
      cur = '';
    }
  }
  if (cur) {
    if (parts.length > 0) {
      parts[parts.length-1] += cur;
    } else {
      parts.push(cur);
    }
  }
  // Remove empty parts
  parts = parts.filter(p => p.length > 0);
  // If we got nothing useful, just return the word
  if (parts.length === 0) return [w];
  return parts;
}

// Better syllable count using regex
function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (word.length <= 2) return 1;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const matches = word.match(/[aeiouy]{1,2}/g);
  return matches ? matches.length : 1;
}

// ── Speech ──
function speakWord(e) {
  e && e.stopPropagation();
  const word = filtered[currentIdx]?.word;
  if (!word) return;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(word);
    utt.lang = 'en-US';
    utt.rate = 0.88;
    utt.pitch = 1.0;
    window.speechSynthesis.speak(utt);
  } else {
    alert('Your browser does not support speech synthesis.');
  }
}

// ── Card Rendering ──
function renderCard() {
  const data = filtered[currentIdx];
  if (!data) return;
  
  // Reset flip
  isFlipped = false;
  const inner = document.getElementById('cardInner');
  inner.classList.remove('flipped');
  
  // Front
  const wordOnly = data.word;
  const posMatch = data.display.match(/\[([^\]]+)\]/);
  const pos = posMatch ? posMatch[1] : '';
  
  document.getElementById('cardWord').textContent = wordOnly;
  document.getElementById('cardPos').textContent = pos ? '[' + pos + ']' : '';
  document.getElementById('diffBadge').textContent = data.difficulty;
  document.getElementById('diffBadge').className = 'difficulty-badge badge-' + data.difficulty.replace(' ', '-');
  
  // Back
  document.getElementById('backWord').textContent = wordOnly;
  
  const syls = syllabify(wordOnly);
  const count = countSyllables(wordOnly);
  
  const sylDisplay = document.getElementById('syllableDisplay');
  sylDisplay.innerHTML = syls.map(s => `<span class="syllable-part">${s}</span>`).join('');
  
  document.getElementById('syllableCount').textContent = 
    count + (count === 1 ? ' syllable' : ' syllables');
  
  // Sentence - highlight the word
  let sent = data.sentence || '';
  const re = new RegExp('\\b' + wordOnly.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
  const highlighted = sent.replace(re, m => `<em>${m}</em>`);
  document.getElementById('sentenceText').innerHTML = highlighted || '<em style="opacity:0.4">No example sentence available.</em>';
  
  // Counter & progress
  document.getElementById('counter').textContent = (currentIdx + 1) + ' / ' + filtered.length;
  const pct = filtered.length > 1 ? ((currentIdx) / (filtered.length - 1)) * 100 : 100;
  document.getElementById('progressBar').style.width = Math.max(0.5, pct) + '%';
  
  // Nav buttons
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  document.getElementById('nextBtn').disabled = currentIdx === filtered.length - 1;
  
  // Update word list highlight
  document.querySelectorAll('.word-chip').forEach((el, i) => {
    el.classList.toggle('current', i === currentIdx);
  });
  // Scroll current chip into view
  const chip = document.querySelector('.word-chip.current');
  if (chip) chip.scrollIntoView({ block: 'nearest' });
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
}

function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= filtered.length) return;
  currentIdx = newIdx;
  renderCard();
}

function setFilter(f) {
  currentFilter = f;
  filtered = f === 'All' ? [...WORDS] : WORDS.filter(w => w.difficulty === f);
  currentIdx = 0;
  
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === f);
  });
  
  // Update counts on buttons
  const counts = {All: WORDS.length};
  WORDS.forEach(w => { counts[w.difficulty] = (counts[w.difficulty]||0) + 1; });
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const f2 = btn.dataset.filter;
    const n = counts[f2] || 0;
    btn.textContent = f2 + ' (' + n + ')';
  });
  
  buildWordList();
  renderCard();
}

function shuffle() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  currentIdx = 0;
  buildWordList();
  renderCard();
}

function toggleList() {
  listOpen = !listOpen;
  document.getElementById('wordListPanel').classList.toggle('open', listOpen);
}

function buildWordList() {
  const container = document.getElementById('wordListInner');
  container.innerHTML = filtered.map((w, i) => 
    `<div class="word-chip${i === currentIdx ? ' current' : ''}" onclick="jumpTo(${i})">${w.word}</div>`
  ).join('');
}

function jumpTo(i) {
  currentIdx = i;
  renderCard();
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  else if (e.key === 'p' || e.key === 'P') speakWord();
});

// Init
setFilter('All');
</script>
